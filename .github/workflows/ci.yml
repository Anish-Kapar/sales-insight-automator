name: CI — Lint & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────
  backend-lint:
    name: Backend · Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check backend/ --select E,F,W --ignore E501

      - name: Validate FastAPI app starts
        run: |
          cd backend
          # Create a dummy .env so imports don't fail
          touch .env
          python -c "from main import app; print('FastAPI app loaded OK')"
        env:
          GROQ_API_KEY: ""
          GEMINI_API_KEY: ""
          API_KEY: ""
          SMTP_USER: ""
          SMTP_PASSWORD: ""

  # ── Backend Docker ────────────────────────────────
  backend-docker:
    name: Backend · Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sales-insight-backend ./backend

  # ── Frontend ─────────────────────────────────────
  frontend-lint-build:
    name: Frontend · Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ci_dummy_key
